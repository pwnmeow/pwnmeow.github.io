  function renderTimeline() {
    const container = document.getElementById('timeline-entries');
    if (!container) return;

    let currentYear = '';
    let html = '';

    timelineData.forEach((entry, index) => {
      if (entry.year !== currentYear) {
        currentYear = entry.year;
        html += `
          <div class="timeline-year-marker">
            <div class="year-label">${currentYear}</div>
          </div>
        `;
      }

      const side = index % 2 === 0 ? 'left' : 'right';

      html += `
        <div class="timeline-entry ${side}">
          <div class="timeline-dot">
            <i class="fas ${entry.icon || 'fa-circle'}"></i>
          </div>
          <div class="timeline-card">
            <div class="card-corner tl"></div>
            <div class="card-corner tr"></div>
            <div class="card-corner bl"></div>
            <div class="card-corner br"></div>
            ${entry.image ? `<div class="timeline-image"><img src="${entry.image}" alt="${entry.title}" loading="lazy"></div>` : ''}
            ${entry.date ? `<div class="timeline-date">${entry.date}</div>` : ''}
            <h3 class="timeline-title">${entry.title}</h3>
            <p class="timeline-description">${entry.description}</p>
          </div>
        </div>
      `;
    });

    container.innerHTML = html;

    setTimeout(() => {
      document.querySelectorAll('.timeline-entry').forEach((el, i) => {
        setTimeout(() => el.classList.add('visible'), i * 80);
      });
    }, 100);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', renderTimeline);
  } else {
    renderTimeline();
  }
})();
</script>
